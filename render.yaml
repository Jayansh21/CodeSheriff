services:
  - type: web
    name: codesheriff-api
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT --workers 1
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GITHUB_APP_ID
        sync: false
      - key: GITHUB_PRIVATE_KEY
        sync: false
      - key: GITHUB_WEBHOOK_SECRET
        sync: false
      - key: HF_TOKEN
        sync: false
      - key: MODEL_PATH
        value: your-username/codesheriff-bug-classifier
      - key: LOG_LEVEL
        value: INFO
      - key: PYTHON_VERSION
        value: "3.10.0"
